name: Run Backtest

on:
  workflow_dispatch:
    inputs:
      BT_PARAMS:
        description: "JSON string with strategy_id, rebalance_type, start_date, end_date, initial_capital"
        required: false
        default: '{"strategy_id":"s01_sma_momentum","rebalance_type":"monthly","initial_capital":1000000}'

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backtest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          BT_PARAMS:    ${{ github.event.inputs.BT_PARAMS }}
        run: python run_backtest.py
